<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>КТО ТУТ?</title>

  <link
    rel="icon"
    type="image/x-icon"
    href="https://i.pinimg.com/736x/3e/3d/81/3e3d81ce2e2f4f1ab7c96ec71ac805d3.jpg"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Shadows+Into+Light&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --text: #f4f4f4;
      --soft-text: rgba(255, 255, 255, 0.86);
      --line: rgba(255, 255, 255, 0.55);
      --link: rgba(255, 255, 255, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, #111217 0%, #07080b 34%, #020202 68%, #000000 100%);
      color: var(--text);
      font-family: 'Bahnschrift', 'Inter', sans-serif;
      user-select: none;
      cursor: none;
    }

    body {
      position: relative;
      animation: screenFlicker 8s infinite;
    }

    @keyframes screenFlicker {
      0%, 100% { filter: brightness(1) contrast(1); }
      48% { filter: brightness(1) contrast(1); }
      49% { filter: brightness(0.992) contrast(1.01); }
      50% { filter: brightness(1.006) contrast(1.02); }
      51% { filter: brightness(0.996) contrast(1.01); }
      52% { filter: brightness(1) contrast(1); }
    }

    .bg-blur-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.12;
      mix-blend-mode: screen;
    }

    .blur-1 {
      width: 360px;
      height: 360px;
      top: 6%;
      left: 8%;
      background: rgba(95, 110, 190, 0.14);
      animation: blurFloat1 18s ease-in-out infinite alternate;
    }

    .blur-2 {
      width: 420px;
      height: 420px;
      right: 8%;
      bottom: 8%;
      background: rgba(110, 26, 40, 0.14);
      animation: blurFloat2 23s ease-in-out infinite alternate;
    }

    .blur-3 {
      width: 260px;
      height: 260px;
      left: 42%;
      top: 68%;
      background: rgba(210, 210, 230, 0.05);
      animation: blurFloat3 20s ease-in-out infinite alternate;
    }

    @keyframes blurFloat1 {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: 0.1; }
      to   { transform: translate3d(55px, -28px, 0) scale(1.05); opacity: 0.13; }
    }

    @keyframes blurFloat2 {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: 0.1; }
      to   { transform: translate3d(-65px, 34px, 0) scale(0.96); opacity: 0.14; }
    }

    @keyframes blurFloat3 {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: 0.04; }
      to   { transform: translate3d(20px, -36px, 0) scale(1.08); opacity: 0.07; }
    }

    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .ghost {
      position: absolute;
      color: rgba(255, 255, 255, 0.03);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      filter: blur(1.5px);
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,255,255,0.02);
    }

    .ghost-1 {
      top: 10%;
      left: 7%;
      font-size: clamp(2rem, 4vw, 4rem);
      animation: ghostFloat1 16s ease-in-out infinite alternate;
    }

    .ghost-2 {
      right: 8%;
      bottom: 20%;
      font-size: clamp(1rem, 2vw, 1.7rem);
      animation: ghostFloat2 20s ease-in-out infinite alternate;
    }

    .ghost-3 {
      left: 61%;
      top: 54%;
      font-size: clamp(1.1rem, 2.4vw, 2rem);
      animation: ghostFloat3 18s ease-in-out infinite alternate;
    }

    @keyframes ghostFloat1 {
      from { transform: translate3d(0, 0, 0); opacity: 0.02; }
      to   { transform: translate3d(18px, -10px, 0); opacity: 0.04; }
    }

    @keyframes ghostFloat2 {
      from { transform: translate3d(0, 0, 0); opacity: 0.018; }
      to   { transform: translate3d(-14px, 11px, 0); opacity: 0.034; }
    }

    @keyframes ghostFloat3 {
      from { transform: translate3d(0, 0, 0); opacity: 0.02; }
      to   { transform: translate3d(12px, -15px, 0); opacity: 0.036; }
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .noise {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 3;
      opacity: 0.07;
      background-image:
        radial-gradient(rgba(255,255,255,0.32) 0.6px, transparent 0.85px),
        radial-gradient(rgba(255,255,255,0.11) 0.5px, transparent 0.75px);
      background-size: 8px 8px, 11px 11px;
      background-position: 0 0, 4px 5px;
      mix-blend-mode: soft-light;
      animation: noiseShift 0.22s steps(2) infinite;
    }

    @keyframes noiseShift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-1%, 1%); }
      50%  { transform: translate(1%, -1%); }
      75%  { transform: translate(0.5%, 1%); }
      100% { transform: translate(0, 0); }
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0.045;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode: soft-light;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(
        circle at center,
        transparent 30%,
        rgba(0, 0, 0, 0.10) 58%,
        rgba(0, 0, 0, 0.34) 100%
      );
    }

    #cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid var(--line);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition:
        width 0.25s ease,
        height 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
      box-shadow: 0 0 0 rgba(255,255,255,0);
      backdrop-filter: blur(1px);
    }

    .content {
      position: relative;
      z-index: 7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      height: 100%;
      text-align: center;
      padding: 24px;
      padding-top: 150px;
    }

    .text-box {
      position: relative;
      width: 760px;
      max-width: 92vw;
      padding: 28px 24px;
      transform: translate3d(0, 0, 0);
      transition: transform 0.3s ease-out;
      will-change: transform;
    }

    .ascii-title-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: -6px;
      min-height: 340px;
      overflow: visible;
    }

    .ascii-title {
      display: inline-block;
      margin: 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 0.82em;
      letter-spacing: 0;
      white-space: pre;
      text-align: left;
      color: #eef2ff;
      text-shadow:
        0 0 12px rgba(220, 230, 255, 0.08),
        0 0 28px rgba(220, 230, 255, 0.03);
      opacity: 0.98;
      filter: drop-shadow(0 0 8px rgba(220, 230, 255, 0.05));
      user-select: none;
      pointer-events: none;
      overflow: visible;
      transform: translateY(80px);
    }

    .desc {
      margin: 8px 0 0;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--soft-text);
      text-shadow: 0 0 16px rgba(255,255,255,0.03);
    }

    .handwritten {
      display: inline-block;
      margin: 0 2px;
      font-family: 'Shadows Into Light', cursive;
      font-size: 1.2em;
      color: #ffffff;
      transform: rotate(-3deg);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
    }

    #quote {
      margin-top: 18px;
      min-height: 1.2em;
      font-size: 0.92rem;
      font-style: italic;
      letter-spacing: 0.01em;
      opacity: 0.14;
      text-shadow: 0 0 12px rgba(255,255,255,0.02);
      transition: opacity 0.8s ease;
    }

    .footer-links {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .footer-links a {
      color: var(--link);
      text-decoration: none;
      font-size: 22px;
      filter: blur(0.2px);
      transition:
        opacity 0.3s ease,
        transform 0.3s ease,
        text-shadow 0.3s ease,
        color 0.3s ease,
        filter 0.3s ease;
    }

    .footer-links a:hover {
      color: rgba(255,255,255,0.96);
      transform: translateY(-3px) scale(1.03);
      text-shadow: 0 0 18px rgba(255,255,255,0.35);
      filter: blur(0);
    }

    @media (max-width: 768px) {
      html, body { cursor: auto; }
      #cursor { display: none; }

      .content {
        padding-top: 110px;
      }

      .text-box {
        width: 92vw;
        padding: 20px 14px;
        transition: none;
      }

      .ascii-title-wrap {
        min-height: 210px;
        margin-bottom: 0;
        overflow: visible;
      }

      .ascii-title {
        font-size: 7px;
        line-height: 0.84em;
        overflow: visible;
        transform: translateY(40px);
      }

      .desc {
        font-size: 0.95rem;
      }

      .footer-links {
        bottom: 22px;
        gap: 20px;
      }

      .noise { opacity: 0.045; }
      .scanlines { opacity: 0.03; }
      .ghost { opacity: 0.5; }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="bg-blur-wrap">
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>
    <div class="bg-blur blur-3"></div>
  </div>

  <div class="ghost-layer">
    <div class="ghost ghost-1">019</div>
    <div class="ghost ghost-2">dream residue</div>
    <div class="ghost ghost-3">fine</div>
  </div>

  <div id="particles-js"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div id="cursor"></div>

  <div class="content">
    <div id="float-box" class="text-box">
      <div class="ascii-title-wrap">
        <pre id="ascii-title" class="ascii-title"></pre>
      </div>

      <p class="desc">
        жить осознавая что смерть
        <span class="handwritten">неизбежна</span>
      </p>

      <div id="quote"></div>
    </div>
  </div>

  <div class="footer-links">
    <a href="https://steamcommunity.com/id/Zero019/ target="_blank" rel="noopener noreferrer" aria-label="Steam">
      <i class="fab fa-steam"></i>
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    const isTouch = window.matchMedia('(pointer: coarse)').matches;

    document.addEventListener('keydown', function (e) {
      const key = e.key ? e.key.toLowerCase() : '';
      if (
        (e.ctrlKey && key === 's') ||
        (e.ctrlKey && key === 'u')
      ) {
        e.preventDefault();
      }
    });

    const cursor = document.getElementById('cursor');

    if (!isTouch) {
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });

      document.querySelectorAll('a').forEach(link => {
        link.addEventListener('mouseenter', () => {
          cursor.style.width = '42px';
          cursor.style.height = '42px';
          cursor.style.background = 'rgba(255,255,255,0.08)';
          cursor.style.borderColor = 'rgba(255,255,255,0.82)';
          cursor.style.boxShadow = '0 0 18px rgba(255,255,255,0.14)';
        });

        link.addEventListener('mouseleave', () => {
          cursor.style.width = '20px';
          cursor.style.height = '20px';
          cursor.style.background = 'transparent';
          cursor.style.borderColor = 'rgba(255,255,255,0.55)';
          cursor.style.boxShadow = '0 0 0 rgba(255,255,255,0)';
        });
      });
    }

    const quotes = [
      'Чоң дик жана тердеген топтор',
      'не бойся',
      'dream residue',
      'Рисовий пиріг',
      'Я не розумію як можна не чіпати 5-річну дівчинку за талію',
      'Міньйон листя',
      'measure 19',
      'Полиция меня ищет',
      'ТРОГАТЬ 5-летнюю девочку это не опасно',
      'Толстые яйца'
    ];

    const quoteEl = document.getElementById('quote');

    function setRandomQuote() {
      quoteEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];
    }

    setRandomQuote();

    setInterval(() => {
      quoteEl.style.opacity = '0';
      setTimeout(() => {
        setRandomQuote();
        quoteEl.style.opacity = '0.14';
      }, 700);
    }, 14000);

    const tabTitles = ['КТО ТУТ?', 'Яйца', 'Хомяк-пенис', 'Хуяка', 'sun', '0.1.9'];
    let titleIndex = 0;

    setInterval(() => {
      document.title = tabTitles[titleIndex];
      titleIndex = (titleIndex + 1) % tabTitles.length;
    }, 1200);

    particlesJS('particles-js', {
      particles: {
        number: {
          value: 48,
          density: {
            enable: true,
            value_area: 900
          }
        },
        color: {
          value: ['#d9d9d9', '#bdbdc7', '#ffffff']
        },
        shape: {
          type: 'circle'
        },
        opacity: {
          value: 0.18,
          random: true,
          anim: {
            enable: true,
            speed: 0.25,
            opacity_min: 0.05,
            sync: false
          }
        },
        size: {
          value: 2.2,
          random: true
        },
        line_linked: {
          enable: false
        },
        move: {
          enable: true,
          speed: 0.55,
          direction: 'none',
          random: true,
          straight: false,
          out_mode: 'out',
          bounce: false
        }
      },
      interactivity: {
        detect_on: 'canvas',
        events: {
          onhover: { enable: false },
          onclick: { enable: false },
          resize: true
        }
      },
      retina_detect: true
    });

    const box = document.getElementById('float-box');

    if (!isTouch) {
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX - window.innerWidth / 2) / 45;
        const y = (e.clientY - window.innerHeight / 2) / 55;
        box.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      });
    }

    const asciiTitle = document.getElementById('ascii-title');
    const asciiChars = ' .,:;irsXA253hMHGS#9B&@';
    const asciiCanvas = document.createElement('canvas');
    const asciiCtx = asciiCanvas.getContext('2d');

    let asciiTime = 0;
    let asciiMouseX = 0;
    let asciiMouseY = 0;

    document.addEventListener('mousemove', (e) => {
      asciiMouseX = (e.clientX - window.innerWidth / 2) / window.innerWidth;
      asciiMouseY = (e.clientY - window.innerHeight / 2) / window.innerHeight;
    });

    function renderAsciiTitle() {
      const isMobile = window.innerWidth < 768;

      const renderWidth = isMobile ? 260 : 420;
      const renderHeight = isMobile ? 90 : 140;

      asciiCanvas.width = renderWidth;
      asciiCanvas.height = renderHeight;

      asciiCtx.clearRect(0, 0, renderWidth, renderHeight);
      asciiCtx.fillStyle = 'black';
      asciiCtx.fillRect(0, 0, renderWidth, renderHeight);

      const driftX = Math.sin(asciiTime * 1.0) * 1.2 + asciiMouseX * 5;
      const driftY = Math.cos(asciiTime * 0.8) * 1.1 + asciiMouseY * 3;

      const fontSize = isMobile ? 58 : 92;

      asciiCtx.save();
      asciiCtx.translate(renderWidth / 2 + driftX, renderHeight / 2 + driftY);
      asciiCtx.textAlign = 'center';
      asciiCtx.textBaseline = 'middle';
      asciiCtx.font = `bold ${fontSize}px monospace`;

      asciiCtx.globalAlpha = 1;
      asciiCtx.fillStyle = '#ffffff';
      asciiCtx.fillText('Z.R', 0, 0);

      asciiCtx.globalAlpha = 0.14 + Math.sin(asciiTime * 1.7) * 0.02;
      asciiCtx.fillStyle = '#cfd8ff';
      asciiCtx.fillText('Z.R', -4, 0);

      asciiCtx.globalAlpha = 0.08 + Math.cos(asciiTime * 1.3) * 0.015;
      asciiCtx.fillStyle = '#ffdede';
      asciiCtx.fillText('Z.R', 4, 0);

      asciiCtx.restore();

      const img = asciiCtx.getImageData(0, 0, renderWidth, renderHeight).data;

      const stepX = isMobile ? 5 : 6;
      const stepY = isMobile ? 5 : 6;

      let output = '';

      for (let y = 0; y < renderHeight; y += stepY) {
        let row = '';

        for (let x = 0; x < renderWidth; x += stepX) {
          const i = (y * renderWidth + x) * 4;
          const r = img[i];
          const g = img[i + 1];
          const b = img[i + 2];

          const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          const noise = (Math.sin(asciiTime * 1.8 + x * 0.04 + y * 0.03) + 1) * 0.02;
          const value = Math.max(0, Math.min(1, brightness + noise));

          const index = Math.floor(value * (asciiChars.length - 1));
          row += asciiChars[index];
        }

        output += row + '\n';
      }

      asciiTitle.textContent = output;
      asciiTime += 0.03;
      requestAnimationFrame(renderAsciiTitle);
    }

    renderAsciiTitle();
  </script>
</body>
</html>
