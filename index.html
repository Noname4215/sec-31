<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>^_^</title>
    <!-- Твоя новая иконка -->
    <link rel="icon" type="image/x-icon" href="https://pinimg.com">
    
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Чуть темнее для глубины */
            overflow: hidden;
            user-select: none;
            cursor: none; 
        }

        /* ЭФФЕКТ ШУМА И ПОЛОС */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://wikimedia.org');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.02) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 100% 3px;
            z-index: 11;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        #cursor {
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out, width 0.3s, height 0.3s;
            transform: translate(-50%, -50%);
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: 'Bahnschrift', 'Inter', sans-serif;
            text-align: center;
        }

        .text-box {
            max-width: 600px;
            padding: 20px;
            position: relative; 
            transition: left 0.4s ease-out, top 0.4s ease-out;
            will-change: left, top;
        }
        
        /* ГЛИТЧ НА ЗАГОЛОВОК */
        h1 { 
            margin: 0; 
            font-size: 2.8em; 
            transition: all 0.2s ease;
        }
        h1:hover {
            animation: glitch 0.3s linear infinite;
            text-shadow: 2px 0 #ff0000, -2px 0 #00ffff;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }

        #quote {
            margin-top: 15px;
            font-size: 0.9em;
            opacity: 0.15; /* Чуть виднее твои фразы */
            font-style: italic;
        }

        .footer-links {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 25px;
        }
        .footer-links a {
            color: #ffffff;
            font-size: 22px;
            opacity: 0.4;
            transition: all 0.4s ease;
            text-decoration: none;
        }
        .footer-links a:hover {
            opacity: 1;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }

        .handwritten {
            font-family: 'Shadows Into Light', cursive;
            font-size: 1.2em;
            color: #ffffff;
            display: inline-block;
            transform: rotate(-3deg);
            margin-left: 4px;
        }
    </style>
</head>
<body oncontextmenu="return false;"> 
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div id="cursor"></div>
    <div id="particles-js"></div>

    <div class="content">
        <div id="float-box" class="text-box" style="left: 0px; top: 0px;">
            <h1>Z.R</h1>
            <p>lost in gmod & dota. 7.5k hours of <span class="handwritten">escapism</span>. i’m <span class="handwritten">fine</span>, really.</p>
            <div id="quote"></div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://steamcommunity.com" target="_blank"><i class="fab fa-steam"></i></a>
        <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.width = '40px';
                cursor.style.height = '40px';
                cursor.style.background = 'rgba(255, 255, 255, 0.1)';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.background = 'transparent';
            });
        });

        /* Твои новые цитаты сохранены */
        const quotes = [
            "Random people in a big city",
            "Яйца",
            "Сделать что-то невозможное так трудно",
            "Измерение 19",
            "Не бойся",
            "Огромный хомяк-пенис"
        ];
        document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 0.6, "random": true, "out_mode": "out" }
            },
            "interactivity": { 
                "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } 
            },
            "retina_detect": true
        });

        const box = document.getElementById('float-box');
        document.addEventListener('mousemove', (e) => {
            let x = (e.pageX - window.innerWidth / 2) / 70;
            let y = (e.pageY - window.innerHeight / 2) / 70;
            box.style.left = x + 'px';
            box.style.top = y + 'px';
        });

        /* Твои заголовки вкладок сохранены */
        const tabTitles = ["019", "S3CRET?", "Yaitsa", "Dream", "Sun"];
        let i = 0;
        setInterval(() => {
            document.title = tabTitles[i];
            i = (i + 1) % tabTitles.length;
        }, 700);

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.keyCode === 65 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
